{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block header %}Customer Login{% endblock %}

{% block content %}
<div class="form-box">
    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Login</button>
    </form>

    <p class="auth-links">
        Don't have an account?
        <a href="{% url 'customer:register' %}">Create one here</a>
    </p>
</div>
{% endblock %}
