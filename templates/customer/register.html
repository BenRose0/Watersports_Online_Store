{% extends 'base.html' %}

{% block title %}Create Account{% endblock %}

{% block header %}Create Account{% endblock %}

{% block content %}
<div class="form-box">
    <h2>Create an Account</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Create Account</button>
    </form>

    <p class="auth-links">
        Already have an account?
        <a href="{% url 'customer:login' %}">Login here</a>
    </p>
</div>
{% endblock %}
